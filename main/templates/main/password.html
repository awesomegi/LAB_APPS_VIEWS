<!DOCTYPE html>
<html>
<head>
    <title>Password</title>
    <style>
        body {
            background-color: #000000; 
            color: #FFFFFF;           
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        .card {
            border: 2px solid #C0C0C0;
            display: inline-block;
            padding: 40px;
            background-color: #1a1a1a; 
        }
        .password {
            font-size: 30px;
            color: #C0C0C0;         
            margin: 20px 0;
            font-weight: bold;
        }
        button {
            background-color: #FFFFFF; 
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 style="color: white;">Your Rental Password</h1>
        <div class="password">{{ generated_password }}</div>
        <button onclick="window.location.reload()">GENERATE NEW</button>
    </div>

</body>
</html>
